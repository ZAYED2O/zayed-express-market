<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZAYED EXPRESS | المنتجات</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .page-header {
      background: var(--color-card);
      padding: 3rem 0;
      text-align: center;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 3rem;
    }
    
    .products-layout {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--color-card);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      border: 1px solid var(--color-border);
      position: sticky;
      top: 100px;
    }
    
    .filter-group {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 1.5rem;
    }
    
    .filter-group:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    
    .filter-title {
      font-weight: 700;
      margin-bottom: 1rem;
      color: #fff;
    }
    
    .filter-list li {
      margin-bottom: 0.5rem;
    }
    
    .filter-list label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      color: var(--color-text-muted);
    }
    
    .filter-list label:hover {
      color: var(--color-text);
    }
    
    .products-main {
      flex: 1;
    }
    
    .products-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      background: var(--color-card);
      padding: 1rem;
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
    }
    
    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }
    
    /* Responsive */
    @media(max-width: 992px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media(max-width: 768px) {
      .products-layout { flex-direction: column; }
      .sidebar { width: 100%; position: static; }
    }
    @media(max-width: 576px) {
      .products-grid { grid-template-columns: 1fr; }
      .products-toolbar { flex-direction: column; gap: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Header (Same as index.html) -->
  <header class="header">
    <div class="main-nav">
      <div class="container nav-container">
        <a href="index.html" class="logo">ZAYED<span>EXPRESS</span></a>
        
        <div class="search-bar">
          <input type="text" class="search-input" id="search-input" placeholder="عن ماذا تبحث؟">
          <button class="search-btn" id="search-btn"><i class="fas fa-search"></i></button>
        </div>
        
        <div class="nav-actions">
          <a href="cart.html" class="action-item">
            <i class="fas fa-shopping-bag"></i>
            <span>السلة</span>
            <div class="badge" id="cart-count">0</div>
          </a>
        </div>
      </div>
    </div>
  </header>

  <div class="page-header">
    <div class="container">
      <h1 id="page-title">جميع المنتجات</h1>
      <p class="text-muted">اكتشف مجموعتنا الواسعة من المنتجات الفاخرة</p>
    </div>
  </div>

  <div class="container mb-xxl">
    <div class="products-layout">
      <!-- Sidebar Filters -->
      <aside class="sidebar">
        <div class="filter-group">
          <h3 class="filter-title">الفئات</h3>
          <ul class="filter-list">
            <li><label><input type="radio" name="category" value="all" checked> الكل</label></li>
            <li><label><input type="radio" name="category" value="electronics"> إلكترونيات</label></li>
            <li><label><input type="radio" name="category" value="fashion"> أزياء</label></li>
            <li><label><input type="radio" name="category" value="home"> المنزل</label></li>
            <li><label><input type="radio" name="category" value="beauty"> عطور وتجميل</label></li>
          </ul>
        </div>
        
        <div class="filter-group">
          <h3 class="filter-title">نطاق السعر</h3>
          <ul class="filter-list">
            <li><label><input type="radio" name="price" value="all" checked> الكل</label></li>
            <li><label><input type="radio" name="price" value="0-500"> أقل من 500 د.إ</label></li>
            <li><label><input type="radio" name="price" value="500-1000"> 500 - 1000 د.إ</label></li>
            <li><label><input type="radio" name="price" value="1000+"> أكثر من 1000 د.إ</label></li>
          </ul>
        </div>
      </aside>
      
      <!-- Main Content -->
      <main class="products-main">
        <div class="products-toolbar">
          <div class="text-muted">تم العثور على <span id="products-count" class="en-text text-primary">0</span> منتج</div>
          <div class="flex items-center gap-sm">
            <label>ترتيب حسب:</label>
            <select class="form-control" id="sort-select" style="width: auto; padding: 0.5rem;">
              <option value="newest">الأحدث</option>
              <option value="price-low">السعر: من الأقل للأعلى</option>
              <option value="price-high">السعر: من الأعلى للأقل</option>
            </select>
          </div>
        </div>
        
        <div class="products-grid" id="products-grid">
          <!-- Products will be injected here -->
        </div>
      </main>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
