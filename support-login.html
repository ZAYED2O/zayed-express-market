<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZAYED EXPRESS | تسجيل دخول الدعم الفني</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    body {
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cairo', sans-serif;
    }
    
    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 2.5rem;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-xl);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.6s ease;
    }
    
    @keyframes fadeIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .login-logo {
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo span {
      color: var(--color-primary);
    }
    
    .login-title {
      font-size: 1.25rem;
      color: #F1F5F9;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      color: #CBD5E1;
    }
    
    .form-control {
      background: rgba(15, 23, 42, 0.6) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: #fff !important;
    }
    
    .form-control:focus {
      border-color: var(--color-primary) !important;
      box-shadow: 0 0 10px rgba(249, 115, 22, 0.25) !important;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-logo">ZAYED<span>EXPRESS</span></div>
    <div class="login-title"><i class="fas fa-user-shield text-primary"></i> بوابة موظفي الدعم الفني</div>
    
    <form id="support-login-form">
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني للعمل</label>
        <input type="email" id="email" class="form-control en-text" required placeholder="name@zayedexpress.com" dir="ltr">
      </div>
      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <input type="password" id="password" class="form-control" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-block mt-xl" style="padding:0.9rem; font-size:1.1rem;">تسجيل الدخول</button>
    </form>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('support-login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const res = auth.login(email, password);
      
      if (res.success) {
        if (res.user.role === 'support' || res.user.role === 'admin') {
          // Redirect to support dashboard
          window.location.href = 'support-dashboard.html';
        } else {
          auth.logout();
          alert('عذراً، هذا الحساب غير مصرح له بالدخول كدعم فني');
        }
      } else {
        alert(res.message || 'فشل تسجيل الدخول، يرجى التحقق من البيانات');
      }
    });
  </script>
</body>
</html>
