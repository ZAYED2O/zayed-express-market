<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZAYED EXPRESS | تفاصيل المنتج</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .product-detail-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      margin-top: 3rem;
    }
    
    .product-gallery {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 100px;
    }
    
    .product-gallery img {
      max-height: 500px;
      object-fit: contain;
    }
    
    .product-info-wrap {
      padding: 1rem 0;
    }
    
    .p-category {
      color: var(--color-primary);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    
    .p-title {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: var(--color-text);
      line-height: 1.3;
    }
    
    .p-rating {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.5rem;
      color: #FFD700;
    }
    
    .p-price-wrap {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 2rem;
    }
    
    .p-price {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--color-primary);
    }
    
    .p-old-price {
      font-size: 1.2rem;
      text-decoration: line-through;
      color: var(--color-text-muted);
      margin-right: 1rem;
    }
    
    .p-desc {
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--color-text);
      margin-bottom: 2rem;
    }
    
    .qty-selector {
      display: flex;
      align-items: center;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      width: fit-content;
      margin-bottom: 2rem;
      background: var(--color-card);
    }
    
    .qty-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--color-text);
      font-size: 1.2rem;
      cursor: pointer;
    }
    
    .qty-input {
      width: 50px;
      height: 40px;
      text-align: center;
      border: none;
      border-left: 1px solid var(--color-border);
      border-right: 1px solid var(--color-border);
      background: transparent;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
    }
    
    .action-buttons {
      display: flex;
      gap: 1rem;
    }
    
    .action-buttons .btn {
      flex: 1;
      padding: 1rem;
      font-size: 1.1rem;
    }
    
    /* Responsive */
    @media(max-width: 768px) {
      .product-detail-layout {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
      .product-gallery {
        position: static;
      }
    }

    /* ---- Reviews Section ---- */
    .reviews-section {
      margin-top: 4rem;
      padding-top: 3rem;
      border-top: 2px solid var(--color-border);
    }

    .reviews-section h2 {
      font-size: 1.8rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .reviews-section h2 i {
      color: #FFD700;
    }

    .review-summary {
      display: flex;
      align-items: center;
      gap: 2rem;
      background: var(--color-card);
      border-radius: var(--radius-lg);
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      border: 1px solid var(--color-border);
    }

    .review-big-score {
      font-size: 4rem;
      font-weight: 800;
      color: var(--color-primary);
      line-height: 1;
      font-family: var(--font-latin);
    }

    .review-stars-avg {
      color: #FFD700;
      font-size: 1.4rem;
    }

    .review-list {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      margin-bottom: 2.5rem;
    }

    .review-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      transition: box-shadow var(--transition-fast);
    }

    .review-card:hover {
      box-shadow: var(--shadow-sm);
    }

    .review-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .reviewer-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .reviewer-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-primary), #EA580C);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .reviewer-name {
      font-weight: 600;
    }

    .reviewer-date {
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }

    .review-stars {
      color: #FFD700;
    }

    .review-comment {
      color: var(--color-text);
      line-height: 1.7;
    }

    /* Write Review Form */
    .write-review-box {
      background: var(--color-card);
      border: 2px solid var(--color-primary);
      border-radius: var(--radius-lg);
      padding: 2rem;
    }

    .write-review-box h3 {
      margin-bottom: 1.5rem;
      color: var(--color-text);
    }

    .star-selector {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      flex-direction: row-reverse;
      justify-content: flex-end;
    }

    .star-selector input { display: none; }

    .star-selector label {
      font-size: 2rem;
      color: #D1D5DB;
      cursor: pointer;
      transition: color var(--transition-fast), transform var(--transition-fast);
    }

    .star-selector label:hover,
    .star-selector label:hover ~ label,
    .star-selector input:checked ~ label {
      color: #FFD700;
      transform: scale(1.1);
    }

    .review-textarea {
      width: 100%;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 1rem;
      font-family: var(--font-arabic);
      font-size: 1rem;
      resize: vertical;
      min-height: 110px;
      color: var(--color-text);
      background: var(--color-bg);
      margin-bottom: 1.25rem;
      transition: border-color var(--transition-fast);
    }

    .review-textarea:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    .login-prompt {
      text-align: center;
      padding: 2rem;
      background: var(--color-card);
      border-radius: var(--radius-lg);
      border: 1px dashed var(--color-border);
    }

    .no-reviews-msg {
      text-align: center;
      padding: 3rem;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="main-nav">
      <div class="container nav-container">
        <a href="index.html" class="logo">ZAYED<span>EXPRESS</span></a>
        
        <div class="nav-actions">
          <a href="cart.html" class="action-item">
            <i class="fas fa-shopping-bag"></i>
            <span>السلة</span>
            <div class="badge" id="cart-count">0</div>
          </a>
        </div>
      </div>
    </div>
  </header>

  <div class="container mb-xxl">
    <div id="product-container">
      <!-- Injected via JS -->
    </div>
    <!-- Reviews Section -->
    <div class="reviews-section" id="reviews-section" style="display:none;">
      <h2><i class="fas fa-star"></i> آراء العملاء</h2>
      <div class="review-summary" id="review-summary"></div>
      <div class="review-list" id="review-list"></div>
      <div id="review-form-wrap"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get('id');
      const container = document.getElementById('product-container');
      
      const product = db.getProductById(productId);
      
      if(!product) {
        container.innerHTML = `
          <div class="text-center" style="padding: 5rem 0;">
            <h2>المنتج غير موجود</h2>
            <p class="text-muted mb-lg">عذراً، المنتج الذي تبحث عنه غير متوفر أو تم حذفه.</p>
            <a href="products.html" class="btn btn-primary">العودة للمنتجات</a>
          </div>
        `;
        return;
      }
      
      // Render Product
      const oldPrice = product.oldPrice ? `<span class="p-old-price en-text">${product.oldPrice} د.إ</span>` : '';
      
      let starsHTML = '';
      const fullStars = Math.floor(product.rating || 5);
      for(let i=0; i<5; i++) {
        if(i < fullStars) starsHTML += '<i class="fas fa-star"></i>';
        else starsHTML += '<i class="far fa-star"></i>';
      }
      
      container.innerHTML = `
        <div class="product-detail-layout">
          <div class="product-gallery">
            <img src="${product.image}" alt="${product.name}">
          </div>
          <div class="product-info-wrap">
            <div class="p-category">${getCategoryName(product.category)}</div>
            <h1 class="p-title">${product.name}</h1>
            <div class="p-rating">
              ${starsHTML}
              <span class="text-muted en-text">(${product.reviews || 0} تقييم)</span>
            </div>
            
            <div class="p-price-wrap">
              <span class="p-price en-text">${product.price} د.إ</span>
              ${oldPrice}
            </div>
            
            <p class="p-desc">${product.description}</p>
            
            <div class="qty-selector">
              <button class="qty-btn" onclick="updateQty(1)"><i class="fas fa-plus"></i></button>
              <input type="text" id="p-qty" class="qty-input en-text" value="1" readonly>
              <button class="qty-btn" onclick="updateQty(-1)"><i class="fas fa-minus"></i></button>
            </div>
            
            <div class="action-buttons">
              <button class="btn btn-primary" onclick="addCurrentToCart('${product.id}')">
                <i class="fas fa-cart-plus"></i> أضف إلى السلة
              </button>
              <button class="btn btn-outline" onclick="showToast('تمت الإضافة للمفضلة')">
                <i class="far fa-heart"></i>
              </button>
            </div>
          </div>
        </div>
      `;
      // Load Reviews after rendering the product
      loadReviews(productId);
    });
    
    function updateQty(change) {
      const input = document.getElementById('p-qty');
      let val = parseInt(input.value) + change;
      if(val < 1) val = 1;
      input.value = val;
    }
    
    function addCurrentToCart(id) {
      const qty = parseInt(document.getElementById('p-qty').value);
      const product = db.getProductById(id);
      db.addToCart(product, qty);
      showToast(`تمت إضافة ${qty} من ${product.name} إلى السلة`);
    }

    // ---- Reviews ----
    function loadReviews(productId) {
      const section = document.getElementById('reviews-section');
      const summaryEl = document.getElementById('review-summary');
      const listEl = document.getElementById('review-list');
      const formWrap = document.getElementById('review-form-wrap');

      section.style.display = 'block';

      const reviews = db.getProductReviews(productId);

      // Summary
      if (reviews.length > 0) {
        const avg = (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1);
        let starsHtml = '';
        for (let i = 1; i <= 5; i++) starsHtml += `<i class="${i <= Math.round(avg) ? 'fas' : 'far'} fa-star"></i>`;
        summaryEl.innerHTML = `
          <div class="review-big-score">${avg}</div>
          <div>
            <div class="review-stars-avg">${starsHtml}</div>
            <div class="text-muted">${reviews.length} تقييم</div>
          </div>
        `;
      } else {
        summaryEl.style.display = 'none';
      }

      // Review Cards
      if (reviews.length === 0) {
        listEl.innerHTML = `<div class="no-reviews-msg"><i class="far fa-comment-dots" style="font-size:3rem;margin-bottom:1rem;"></i><br>لا توجد مراجعات بعد. كن أول من يقيّم!</div>`;
      } else {
        listEl.innerHTML = reviews.map(r => {
          const date = new Date(r.created_at || Date.now()).toLocaleDateString('ar-AE');
          let stars = '';
          for (let i = 1; i <= 5; i++) stars += `<i class="${i <= r.rating ? 'fas' : 'far'} fa-star"></i>`;
          const initial = (r.username || 'م')[0].toUpperCase();
          return `
            <div class="review-card">
              <div class="review-card-header">
                <div class="reviewer-info">
                  <div class="reviewer-avatar">${initial}</div>
                  <div>
                    <div class="reviewer-name">${r.username || 'مستخدم مجهول'}</div>
                    <div class="reviewer-date">${date}</div>
                  </div>
                </div>
                <div class="review-stars">${stars}</div>
              </div>
              <p class="review-comment">${r.comment}</p>
            </div>
          `;
        }).join('');
      }

      // Write Review Form
      const user = JSON.parse(localStorage.getItem('ze_current_user') || 'null');
      if (user) {
        formWrap.innerHTML = `
          <div class="write-review-box">
            <h3><i class="fas fa-pen-nib" style="color:var(--color-primary);margin-left:0.5rem;"></i>أضف مراجعتك</h3>
            <div class="star-selector" id="star-selector">
              <input type="radio" id="s5" name="rating" value="5"><label for="s5">&#9733;</label>
              <input type="radio" id="s4" name="rating" value="4"><label for="s4">&#9733;</label>
              <input type="radio" id="s3" name="rating" value="3" checked><label for="s3">&#9733;</label>
              <input type="radio" id="s2" name="rating" value="2"><label for="s2">&#9733;</label>
              <input type="radio" id="s1" name="rating" value="1"><label for="s1">&#9733;</label>
            </div>
            <textarea id="review-text" class="review-textarea" placeholder="شارك تجربتك مع هذا المنتج..."></textarea>
            <button class="btn btn-primary" id="submit-review-btn" onclick="submitReview('${productId}')">
              <i class="fas fa-paper-plane"></i> إرسال المراجعة
            </button>
          </div>
        `;
      } else {
        formWrap.innerHTML = `
          <div class="login-prompt">
            <i class="fas fa-lock" style="font-size:2.5rem;color:var(--color-primary);margin-bottom:1rem;"></i>
            <p style="margin-bottom:1rem;font-size:1.1rem;">سجّل دخولك لكتابة مراجعة</p>
            <a href="login.html" class="btn btn-primary">تسجيل الدخول</a>
          </div>
        `;
      }
    }

    function submitReview(productId) {
      const ratingInput = document.querySelector('input[name="rating"]:checked');
      const commentInput = document.getElementById('review-text');
      if (!ratingInput || !commentInput.value.trim()) {
        showToast('الرجاء اختيار تقييم وكتابة تعليق', 'error');
        return;
      }
      const btn = document.getElementById('submit-review-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';

      const result = db.addProductReview(productId, {
        rating: parseInt(ratingInput.value),
        comment: commentInput.value.trim()
      });

      if (result) {
        showToast('تم إضافة مراجعتك بنجاح!');
        loadReviews(productId);
      } else {
        showToast('حدث خطأ، الرجاء المحاولة مرة أخرى', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال المراجعة';
      }
    }
  </script>
</body>
</html>
